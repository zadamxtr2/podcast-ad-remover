name: Verify

on:
  push:
    branches:
      - master
      - audit-work
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATA_DIR: /tmp/podcast-ad-remover-data
      SESSION_SECRET_KEY: ci-session-secret-for-verification-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify
